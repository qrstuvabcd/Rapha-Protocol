[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[rpc_endpoints]
cdk_devnet = "http://localhost:8545"
polygon_amoy = "https://rpc-amoy.polygon.technology"

[etherscan]
polygon = { key = "${POLYGONSCAN_API_KEY}" }
