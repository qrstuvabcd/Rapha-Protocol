# fly.toml - Rapha Chain Configuration
app = "rapha-chain"
primary_region = "sin"  # Singapore (change to nearest region)

[build]
  dockerfile = "Dockerfile"

[env]
  CHAIN_ID = "rapha-testnet-1"

[[services]]
  internal_port = 8545
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    hard_limit = 100
    soft_limit = 80

[[services]]
  internal_port = 26657
  protocol = "tcp"

  [[services.ports]]
    port = 26657

[[services]]
  internal_port = 1317
  protocol = "tcp"

  [[services.ports]]
    port = 1317

[mounts]
  source = "rapha_data"
  destination = "/root/.rapha"
